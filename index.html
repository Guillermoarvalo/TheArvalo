<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARVALO</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #1a1a1a;
            --white: #f8f8f8;
            --gray-dark: #3a3a3a;
            --gray-light: #d8d8d8;
            --gray-medium: #888888;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
            font-weight: 300;
        }

        /* HERO HEADER */
        .hero-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--gray-light);
        }

        .hero-logo {
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 400;
            text-decoration: none;
            color: var(--black);
            letter-spacing: 1px;
        }

        .hero-nav {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .hero-nav a {
            font-size: 12px;
            text-decoration: none;
            color: var(--black);
            letter-spacing: 0.8px;
            font-weight: 400;
            position: relative;
            transition: color 0.3s ease;
        }



        .hero-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--black);
            transition: width 0.3s ease;
        }

        .hero-nav a:hover::after {
            width: 100%;
        }

        /* MENU TOGGLE */
        .menu-toggle {
            position: relative;
            cursor: pointer;
            font-size: 18px;
            color: var(--black);
        }

        .menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border: 1px solid var(--gray-light);
            min-width: 180px;
            display: none;
            flex-direction: column;
            margin-top: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .menu-toggle.active .menu-dropdown {
            display: flex;
        }

        .menu-dropdown a {
            padding: 15px 20px;
            text-decoration: none;
            color: var(--black);
            font-size: 11px;
            letter-spacing: 0.8px;
            font-weight: 400;
            border-bottom: 1px solid var(--gray-light);
            transition: background 0.3s ease;
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background: var(--gray-light);
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--white);
            padding: 40px;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
            animation: fadeInDown 1.2s ease-out;
        }

        .hero h1 {
            font-family: 'Lora', serif;
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 2px;
            line-height: 1;
        }

        .hero-subtitle {
            font-size: 14px;
            color: var(--gray-medium);
            font-weight: 300;
            margin-bottom: 0px;
            letter-spacing: 2px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            animation: bounce 2s infinite;
        }

        .scroll-indicator p {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray-medium);
            margin-bottom: 12px;
            font-weight: 300;
        }

        .scroll-line {
            width: 1px;
            height: 25px;
            background: var(--gray-light);
            margin: 0 auto;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero-header {
                padding: 20px;
            }

            .hero-nav {
                gap: 30px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 12px;
            }
        }
    </style>
    <script>
        function toggleMenu() {
            const dropdown = document.querySelector(".menu-dropdown");
            dropdown.style.display = dropdown.style.display === "flex" ? "none" : "flex";
        }
        document.addEventListener("click", function(event) {
            const menuToggle = document.querySelector(".menu-toggle");
            const dropdown = document.querySelector(".menu-dropdown");
            if (!menuToggle.contains(event.target)) {
                dropdown.style.display = "none";
            }
        });
    </script>
</head>
<body>
    <!-- HERO HEADER -->
    <header class="hero-header">
        <a href="index.html" class="hero-logo">THE ARVALO</a>
        <nav class="hero-nav">
            <a href="shop.html">Shop All</a>
            <a href="about.html">About the Brand</a>
            <a href="studio.html">The Arvalo Studio</a>
            <div class="menu-toggle" onclick="toggleMenu()">
                ≡
                <div class="menu-dropdown">
                    <a href="shop.html">01 Shop All</a>
                    <a href="about.html">02 About the Brand</a>
                    <a href="studio.html">03 The Arvalo Studio</a>
                    <a href="contact.html" style="border-top: 1px solid var(--gray-light); margin-top: 10px; padding-top: 15px;">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>THE ARVALO</h1>
        </div>

        <div class="scroll-indicator">
            <p>Scroll</p>
            <div class="scroll-line"></div>
        </div>
    </section>
</body>
</html>
